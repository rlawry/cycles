<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Cyclic Period Explorer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f0eaff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

h1 { display: none; }
#subtitle { display: none; }

canvas {

}

#controls {

}

}

}

#submitBtn {

}

#submitBtn:hover:not(:disabled) { background: #cdb0f0; }

#trendLabel {

#feedback {

}

.ok  { color: #4aaa55; }
.err { color: #cc5858; }

#complete {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  margin-top: 30px;
  text-align: center;
}

#complete-title {

  color: #4a8840;
  text-shadow: 1px 1px 0 #b8e8b0;
}

#complete-sub {
  font-size: 0.82em;
  letter-spacing: 3px;
  color: #90b888;
}

#cow-frame {
  border: 2px solid #b0d8a0;
  background: #edfae8;
  padding: 12px 18px;
}
</style>
</head>
<body>

<div id="subtitle">hover to inspect &bull; count the cycles &bull; name the period</div>

<canvas id="c"></canvas>

<div id="complete">

      <!-- Grass in mouth -->

<script>
'use strict';

// ─── Canvas dimensions ────────────────────────────────────────────────────────

const W = 820, H = 460;
const PAD = { top: 52, right: 115, bottom: 58, left: 68 };

// ─── Datasets ─────────────────────────────────────────────────────────────────
// Each has a distinct, guessable period. Noise is calibrated so the signal is
// visible but not trivially obvious from a quick glance.

// modAmp/modPeriod/modPhase control a slow envelope that varies peak heights.
const DATASETS = [
  { period: 5,  amp: 2.8, phase: 0.40, xMax: 22,  noise: 0.50, nPts: 80,  modAmp: 0.55, modPeriod: 14,  modPhase: 0.8 },  // ~4 cycles
  { period: 8,  amp: 3.5, phase: 1.10, xMax: 68,  noise: 0.80, nPts: 100, modAmp: 0.40, modPeriod: 35,  modPhase: 2.1 },  // ~8.5 cycles
  { period: 12, amp: 4.0, phase: 0.70, xMax: 46,  noise: 1.00, nPts: 110, modAmp: 0.60, modPeriod: 28,  modPhase: 1.3 },  // ~3.8 cycles
  { period: 18, amp: 3.8, phase: 0.20, xMax: 135, noise: 1.25, nPts: 120, modAmp: 0.45, modPeriod: 70,  modPhase: 0.4 },  // ~7.5 cycles
  { period: 25, amp: 4.5, phase: 1.50, xMax: 88,  noise: 1.55, nPts: 130, modAmp: 0.50, modPeriod: 55,  modPhase: 1.9 },  // ~3.5 cycles
  { period: 6,  amp: 3.2, phase: 0.90, xMax: 30,  noise: 0.60, nPts: 85,  modAmp: 0.50, modPeriod: 18,  modPhase: 1.2 },  // ~5 cycles
  { period: 10, amp: 3.8, phase: 0.30, xMax: 72,  noise: 0.90, nPts: 105, modAmp: 0.35, modPeriod: 42,  modPhase: 2.7 },  // ~7 cycles
  { period: 15, amp: 4.2, phase: 1.80, xMax: 58,  noise: 1.10, nPts: 115, modAmp: 0.55, modPeriod: 32,  modPhase: 0.6 },  // ~3.9 cycles
  { period: 22, amp: 3.6, phase: 0.60, xMax: 154, noise: 1.40, nPts: 125, modAmp: 0.42, modPeriod: 80,  modPhase: 1.7 },  // ~7 cycles
  { period: 30, amp: 4.8, phase: 1.20, xMax: 108, noise: 1.70, nPts: 135, modAmp: 0.48, modPeriod: 65,  modPhase: 0.3 },  // ~3.6 cycles
];

// ─── Palettes (pastel) ────────────────────────────────────────────────────────

const PALETTES = [
  { dot: '#8ab8f0', line: '#3a78cc', grid: '#ddeaf8', bg: '#f4f9ff', flash: 'rgba(138,184,240,0.52)' },  // blue
  { dot: '#f09ab8', line: '#c84868', grid: '#f8e0ea', bg: '#fff2f6', flash: 'rgba(240,154,184,0.52)' },  // pink
  { dot: '#88d890', line: '#38a848', grid: '#dff0e0', bg: '#f4fef5', flash: 'rgba(136,216,144,0.52)' },  // green
  { dot: '#f0cc70', line: '#c09020', grid: '#f8f0d8', bg: '#fefdf2', flash: 'rgba(240,204,112,0.52)' },  // yellow
  { dot: '#b898f0', line: '#6c38cc', grid: '#ece0f8', bg: '#f9f4ff', flash: 'rgba(184,152,240,0.52)' },  // lavender
  { dot: '#f0b888', line: '#cc6820', grid: '#f8ece0', bg: '#fff8f2', flash: 'rgba(240,184,136,0.52)' },  // peach
  { dot: '#80dce8', line: '#2898a8', grid: '#d8f2f5', bg: '#f2fcfd', flash: 'rgba(128,220,232,0.52)' },  // teal
  { dot: '#e8a0e8', line: '#a030a0', grid: '#f5e0f5', bg: '#fdf4fd', flash: 'rgba(232,160,232,0.52)' },  // orchid
  { dot: '#a8d8a0', line: '#488040', grid: '#e4f0e2', bg: '#f6fdf5', flash: 'rgba(168,216,160,0.52)' },  // sage
  { dot: '#f0a0a0', line: '#c83838', grid: '#f8e0e0', bg: '#fff4f4', flash: 'rgba(240,160,160,0.52)' },  // rose
];

// One marker shape per dataset: circle, square, triangle, diamond, cross
const MARKERS = ['circle', 'square', 'triangle', 'diamond', 'cross'];

// ─── State ────────────────────────────────────────────────────────────────────

let curIdx      = 0;
let allData     = [];
let mouseX      = null;
let flash       = null;
let rafId       = null;
let advancing   = false;
let showTrend   = false;

// ─── DOM ──────────────────────────────────────────────────────────────────────

const canvas      = document.getElementById('c');
const ctx         = canvas.getContext('2d');
const pInput      = document.getElementById('pInput');
const submitBtn   = document.getElementById('submitBtn');
const trendChk    = document.getElementById('trendChk');
const feedbackEl  = document.getElementById('feedback');
const completeEl  = document.getElementById('complete');
const controlsEl  = document.getElementById('controls');

canvas.width  = W;
canvas.height = H;

// ─── Data generation ──────────────────────────────────────────────────────────

function envelope(cfg, x) {
  return 1 + cfg.modAmp * Math.sin(2 * Math.PI * x / cfg.modPeriod + cfg.modPhase);
}

function generateDataset(cfg) {
  const pts = [];
  for (let i = 0; i < cfg.nPts; i++) {
    const x = (i / (cfg.nPts - 1)) * cfg.xMax;
    const y = cfg.amp * envelope(cfg, x) * Math.sin(2 * Math.PI * x / cfg.period + cfg.phase)
              + (Math.random() - 0.5) * 2 * cfg.noise;
    pts.push({ x, y });
  }
  return pts;
}

// ─── Coordinate helpers ───────────────────────────────────────────────────────

function box() {
  return {
    x0: PAD.left,
    y0: PAD.top,
    x1: W - PAD.right,
    y1: H - PAD.bottom,
    w:  W - PAD.left - PAD.right,
    h:  H - PAD.top  - PAD.bottom,
  };
}

function toPx(dx, dy, xMin, xMax, yMin, yMax, b) {
  return {
    px: b.x0 + (dx - xMin) / (xMax - xMin) * b.w,
    py: b.y1 - (dy - yMin) / (yMax - yMin) * b.h,
  };
}

function toDataX(cx, xMin, xMax, b) {
  return xMin + (cx - b.x0) / b.w * (xMax - xMin);
}

// ─── Nice tick generator ──────────────────────────────────────────────────────

function niceTicks(lo, hi, n) {
  const span = hi - lo;
  const raw  = span / n;
  const mag  = Math.pow(10, Math.floor(Math.log10(raw)));
  let step   = mag * 10;
  for (const m of [1, 2, 2.5, 5, 10]) {
    if (mag * m >= raw) { step = mag * m; break; }
  }
  const ticks = [];
  const start = Math.ceil(lo / step) * step;
  for (let t = start; t < hi + step * 1e-6; t += step) {
    ticks.push(+(t.toFixed(10)));
  }
  return ticks;
}

// ─── Render ───────────────────────────────────────────────────────────────────

function render() {
  ctx.clearRect(0, 0, W, H);

  const cfg = DATASETS[curIdx];
  const pts = allData[curIdx];
  const pal = PALETTES[curIdx];
  const b   = box();

  // Background
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);

  // Y axis range
  const ys   = pts.map(p => p.y);
  const yRaw = { lo: Math.min(...ys), hi: Math.max(...ys) };
  const yPad = (yRaw.hi - yRaw.lo) * 0.22;
  const yMin = yRaw.lo - yPad;
  const yMax = yRaw.hi + yPad;
  const xMin = 0, xMax = cfg.xMax;

  const xTicks = niceTicks(xMin, xMax, 8);
  const yTicks = niceTicks(yMin, yMax, 6);

  // ── Grid lines ──
  ctx.save();
  ctx.strokeStyle = pal.grid;
  ctx.lineWidth   = 1;
  ctx.setLineDash([3, 6]);
  for (const tx of xTicks) {
    const { px } = toPx(tx, 0, xMin, xMax, yMin, yMax, b);
    ctx.beginPath(); ctx.moveTo(px, b.y0); ctx.lineTo(px, b.y1); ctx.stroke();
  }
  for (const ty of yTicks) {
    const { py } = toPx(0, ty, xMin, xMax, yMin, yMax, b);
    ctx.beginPath(); ctx.moveTo(b.x0, py); ctx.lineTo(b.x1, py); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();

  // ── Axes ──
  ctx.strokeStyle = '#c0aed8';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(b.x0, b.y0); ctx.lineTo(b.x0, b.y1); ctx.lineTo(b.x1, b.y1);
  ctx.stroke();

  // ── X tick marks & labels ──
  ctx.font         = '11px Courier New';
  ctx.fillStyle    = '#9080b8';
  ctx.strokeStyle  = '#c0aed8';
  ctx.lineWidth    = 1;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  for (const tx of xTicks) {
    const { px } = toPx(tx, 0, xMin, xMax, yMin, yMax, b);
    ctx.beginPath(); ctx.moveTo(px, b.y1); ctx.lineTo(px, b.y1 + 5); ctx.stroke();
    ctx.fillText(Number.isInteger(tx) ? String(tx) : tx.toFixed(1), px, b.y1 + 7);
  }

  // ── Y tick marks & labels ──
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'middle';
  for (const ty of yTicks) {
    const { py } = toPx(0, ty, xMin, xMax, yMin, yMax, b);
    ctx.beginPath(); ctx.moveTo(b.x0 - 5, py); ctx.lineTo(b.x0, py); ctx.stroke();
    ctx.fillText(ty.toFixed(1), b.x0 - 8, py);
  }

  // ── Axis labels ──
  ctx.fillStyle    = '#7060a8';
  ctx.font         = '12px Courier New';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('time', b.x0 + b.w / 2, H - 8);

  ctx.save();
  ctx.translate(15, b.y0 + b.h / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textBaseline = 'top';
  ctx.fillText('value', 0, 0);
  ctx.restore();

  // ── Trendline (hidden unless checkbox checked) ──
  if (showTrend) {
    ctx.save();
    ctx.strokeStyle = pal.line;
    ctx.lineWidth   = 2.2;
    ctx.globalAlpha = 0.60;
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    let first = true;
    for (let px = b.x0; px <= b.x1; px += 0.5) {
      const dx = toDataX(px, xMin, xMax, b);
      const dy = cfg.amp * envelope(cfg, dx) * Math.sin(2 * Math.PI * dx / cfg.period + cfg.phase);
      const { py } = toPx(dx, dy, xMin, xMax, yMin, yMax, b);
      if (first) { ctx.moveTo(px, py); first = false; }
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  }

  // ── Scatter markers ──
  const marker = MARKERS[curIdx % MARKERS.length];
  for (const pt of pts) {
    const { px, py } = toPx(pt.x, pt.y, xMin, xMax, yMin, yMax, b);
    ctx.fillStyle   = pal.dot;
    ctx.strokeStyle = pal.line;
    ctx.lineWidth   = 0.9;
    drawMarker(ctx, marker, px, py, 4.5);
  }

  // ── Graph counter (top left, inside plot) ──
  ctx.fillStyle    = '#b0a0cc';
  ctx.font         = '11px Courier New';
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`graph ${curIdx + 1} / ${DATASETS.length}`, b.x0 + 6, b.y0 + 5);

  // ── Cursor vertical line + x readout ──
  if (mouseX !== null && mouseX >= b.x0 && mouseX <= b.x1) {
    // Dashed vertical line
    ctx.save();
    ctx.strokeStyle = '#9040c0';
    ctx.lineWidth   = 1.5;
    ctx.globalAlpha = 0.55;
    ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.moveTo(mouseX, b.y0); ctx.lineTo(mouseX, b.y1); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Readout box — upper-right margin of canvas
    const dataX = toDataX(mouseX, xMin, xMax, b);
    const label = `t = ${dataX.toFixed(2)}`;
    ctx.font    = '12px Courier New';
    const tw    = ctx.measureText(label).width + 16;
    const rx    = W - PAD.right + 6;
    const ry    = PAD.top;
    ctx.fillStyle = '#ece4fc';
    ctx.fillRect(rx, ry, PAD.right - 10, 22);
    ctx.strokeStyle = '#c0a8e8';
    ctx.lineWidth   = 1;
    ctx.strokeRect(rx, ry, PAD.right - 10, 22);
    ctx.fillStyle    = '#6040a0';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rx + (PAD.right - 10) / 2, ry + 11);
  }

  // ── Flash overlay ──
  if (flash && flash.alpha > 0) {
    ctx.save();
    ctx.globalAlpha = flash.alpha;
    ctx.fillStyle   = flash.color;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

// ─── Marker drawing ───────────────────────────────────────────────────────────

function drawMarker(c, shape, x, y, r) {
  c.beginPath();
  switch (shape) {
    case 'circle':
      c.arc(x, y, r, 0, 2 * Math.PI);
      break;
    case 'square':
      c.rect(x - r, y - r, r * 2, r * 2);
      break;
    case 'triangle':
      c.moveTo(x,         y - r * 1.2);
      c.lineTo(x + r * 1.1, y + r * 0.8);
      c.lineTo(x - r * 1.1, y + r * 0.8);
      c.closePath();
      break;
    case 'diamond':
      c.moveTo(x,      y - r * 1.3);
      c.lineTo(x + r,  y);
      c.lineTo(x,      y + r * 1.3);
      c.lineTo(x - r,  y);
      c.closePath();
      break;
    case 'cross': {
      const t = r * 0.38;
      c.moveTo(x - r,  y - t); c.lineTo(x - t,  y - t);
      c.lineTo(x - t,  y - r); c.lineTo(x + t,  y - r);
      c.lineTo(x + t,  y - t); c.lineTo(x + r,  y - t);
      c.lineTo(x + r,  y + t); c.lineTo(x + t,  y + t);
      c.lineTo(x + t,  y + r); c.lineTo(x - t,  y + r);
      c.lineTo(x - t,  y + t); c.lineTo(x - r,  y + t);
      c.closePath();
      break;
    }
  }
  c.fill();
  c.stroke();
}

// ─── Utility: manual roundRect for cross-browser compat ───────────────────────

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ─── Flash animation ──────────────────────────────────────────────────────────

function startFlash(color, onDone) {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  flash = { color, alpha: 0.42 };

  function tick() {
    flash.alpha -= 0.014;
    if (flash.alpha <= 0) {
      flash = null;
      rafId = null;
      render();
      if (onDone) onDone();
      return;
    }
    render();
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

// ─── Answer checking ──────────────────────────────────────────────────────────

function checkAnswer() {
  if (advancing) return;
  const val = parseFloat(pInput.value);
  if (!isFinite(val) || val <= 0) {
    feedbackEl.textContent = 'please enter a positive number.';
    feedbackEl.className   = 'err';
    return;
  }

  const truePeriod = DATASETS[curIdx].period;
  const tolerance  = Math.max(0.8, truePeriod * 0.12);

  if (Math.abs(val - truePeriod) <= tolerance) {
    advancing          = true;
    submitBtn.disabled = true;
    feedbackEl.textContent = `✓  correct!  the period is ${truePeriod}.`;
    feedbackEl.className   = 'ok';
    startFlash(PALETTES[curIdx].flash, () => {
      setTimeout(advance, 350);
    });
  } else {
    feedbackEl.textContent = '✗  not quite — try again.';
    feedbackEl.className   = 'err';
    startFlash('rgba(220, 110, 110, 0.42)');
  }
}

function advance() {
  curIdx++;
  advancing          = false;
  submitBtn.disabled = false;
  pInput.value       = '';
  feedbackEl.textContent = '';
  feedbackEl.className   = '';
  showTrend        = false;
  trendChk.checked = false;

  if (curIdx >= DATASETS.length) {
    canvas.style.display     = 'none';
    controlsEl.style.display = 'none';
    feedbackEl.style.display = 'none';
    completeEl.style.display = 'flex';
    return;
  }
  render();
}

// ─── Mouse events ─────────────────────────────────────────────────────────────

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX  = (e.clientX - r.left) * (W / r.width);
  if (!rafId) render();
});

canvas.addEventListener('mouseleave', () => {
  mouseX = null;
  if (!rafId) render();
});

// ─── Keyboard / button ────────────────────────────────────────────────────────

trendChk.addEventListener('change', () => { showTrend = trendChk.checked; render(); });
submitBtn.addEventListener('click', checkAnswer);
pInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});
pInput.addEventListener('focus', () => { pInput.placeholder = ''; }, { once: true });

// ─── Boot ─────────────────────────────────────────────────────────────────────

for (const cfg of DATASETS) allData.push(generateDataset(cfg));
render();
</script>
</body>
</html>
